<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- �o� -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="50%" stop-color="#764ba2" />
      <stop offset="100%" stop-color="#f093fb" />
    </linearGradient>
    <!-- b�� -->
    <radialGradient id="face" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e8eaf6" />
    </radialGradient>
    <!-- <[�I -->
    <radialGradient id="eyeGlow" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#80d8ff" />
      <stop offset="100%" stop-color="#2979ff" />
    </radialGradient>
    <!-- IUH� -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#3d5afe" flood-opacity="0.3" />
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- �o�c�b -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)" />

