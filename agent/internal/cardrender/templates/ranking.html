<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 600px;
  font-family: -apple-system, "Noto Sans SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: #ffffff;
  padding: 32px;
}
.card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e8ecf1;
  padding: 28px;
}
.card-title {
  font-size: 17px;
  font-weight: 600;
  color: #1a1a2e;
  margin-bottom: 20px;
}
.rank-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 0;
}
.rank-num {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
  color: #fff;
}
.rank-1 { background: linear-gradient(135deg, #f7971e, #ffd200); }
.rank-2 { background: linear-gradient(135deg, #a8b8c8, #c0c8d0); }
.rank-3 { background: linear-gradient(135deg, #cd7f32, #e8a862); }
.rank-other { background: #e8ecf1; color: #5a6178; }
.rank-name {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  color: #333;
}
.rank-bar-wrap {
  flex: 2;
  height: 22px;
  background: #f1f3f8;
  border-radius: 11px;
  overflow: hidden;
}
.rank-bar {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 11px;
  min-width: 4px;
}
.rank-value {
  width: 60px;
  text-align: right;
  font-size: 14px;
  font-weight: 600;
  color: #1a1a2e;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="card">
  {{if .title}}<div class="card-title">{{.title}}</div>{{end}}
  {{range $i, $item := .items}}
  {{$rank := add $i 1}}
  <div class="rank-item">
    <div class="rank-num {{if eq $rank 1}}rank-1{{else if eq $rank 2}}rank-2{{else if eq $rank 3}}rank-3{{else}}rank-other{{end}}">{{$rank}}</div>
    <span class="rank-name">{{$item.name}}</span>
    <div class="rank-bar-wrap"><div class="rank-bar" style="width: {{percent $item.value $.maxValue}}%"></div></div>
    <span class="rank-value">{{$item.value}}</span>
  </div>
  {{end}}
</div>
</body>
</html>
